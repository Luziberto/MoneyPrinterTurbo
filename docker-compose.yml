x-common-volumes: &common-volumes
  - ./:/MoneyPrinterTurbo

volumes:
  collector_data:

services:
  webui:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: "moneyprinterturbo-webui"
    ports:
      - "127.0.0.1:8501:8501"
    command: [ "streamlit", "run", "./webui/Main.py","--browser.serverAddress=127.0.0.1","--server.enableCORS=True","--browser.gatherUsageStats=False","--server.showEmailPrompt=False" ]
    volumes: *common-volumes
    restart: always
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: "moneyprinterturbo-api"
    ports:
      - "127.0.0.1:8080:8080"
    command: [ "python3", "main.py" ]
    volumes:
      - ./:/MoneyPrinterTurbo
      - collector_data:/data/downloads:ro
    restart: always
  # Optional: external Stock Video Collector service (replace image when available)
  # collector:
  #   image: <your-collector-image>
  #   container_name: "stock-video-collector"
  #   ports:
  #     - "127.0.0.1:8090:8090"
  #   volumes:
  #     - collector_data:/data/downloads
  #   restart: unless-stopped
